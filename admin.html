<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-grid { display: grid; gap: 20px; text-align: left; }
        .accordion-item { background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .accordion-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { display: none; padding: 25px; background: rgba(0,0,0,0.3); }
        
        .result-container { display: flex; flex-wrap: wrap; gap: 30px; align-items: center; justify-content: center; }
        .chart-wrapper { flex: 1; min-width: 250px; max-width: 300px; }
        .stats-wrapper { flex: 1; min-width: 280px; }

        .winner-badge { font-size: 0.75rem; background: #facc15; color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 800; text-transform: uppercase; margin-left: 10px; }
        .tie-badge { background: #94a3b8; color: #000; }

        .rank-list { list-style: none; padding: 0; margin: 0; width: 100%; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .rank-item.is-winner { color: #facc15; font-weight: bold; }
        .vote-count { font-family: monospace; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <header>
        <h1>Election Results Dashboard</h1>
        <p id="status">Connecting to Cloud Database...</p>
    </header>
    
    <div class="admin-grid" id="mainDashboard"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";

async function loadResults() {
    const dashboard = document.getElementById("mainDashboard");
    try {
        const response = await fetch(`${SCRIPT_URL}?action=getResults`);
        const rows = await response.json();
        const votes = rows.map(r => ({ selections: JSON.parse(r[2]) }));
        
        document.getElementById("status").innerText = `Total Ballots Counted: ${votes.length}`;
        dashboard.innerHTML = "";

        if (votes.length === 0) return;

        const positions = Object.keys(votes[0].selections);

        positions.forEach(pos => {
            const counts = {};
            votes.forEach(v => {
                const choice = v.selections[pos];
                counts[choice] = (counts[choice] || 0) + 1;
            });

            // Logic to find Winner(s) and handle Ties
            const sortedEntries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const maxVotes = sortedEntries[0][1];
            const winners = sortedEntries.filter(entry => entry[1] === maxVotes);
            const isTie = winners.length > 1;

            const id = pos.replace(/\s+/g, '');
            const item = document.createElement('div');
            item.className = 'accordion-item';

            // Header UI with Tie/Winner Detection
            const badgeClass = isTie ? 'winner-badge tie-badge' : 'winner-badge';
            const badgeText = isTie ? `👔 Tie: ${winners.length} Candidates` : `🏆 Winner: ${winners[0][0]}`;

            item.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <div>
                        <strong>${pos}</strong>
                        <span class="${badgeClass}">${badgeText}</span>
                    </div>
                    <span>+</span>
                </div>
                <div class="accordion-content">
                    <div class="result-container">
                        <div class="chart-wrapper">
                            <canvas id="chart-${id}"></canvas>
                        </div>
                        <div class="stats-wrapper">
                            <ul class="rank-list">
                                ${sortedEntries.map(([name, count]) => `
                                    <li class="rank-item ${count === maxVotes ? 'is-winner' : ''}">
                                        <span>${count === maxVotes ? '⭐ ' : ''}${name}</span>
                                        <span class="vote-count">${count} votes</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
            dashboard.appendChild(item);

            // Chart Rendering
            const labels = sortedEntries.map(e => e[0]);
            const dataValues = sortedEntries.map(e => e[1]);

            new Chart(document.getElementById(`chart-${id}`), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: labels.map(l => winners.some(w => w[0] === l) ? '#facc15' : 'rgba(255,255,255,0.1)'),
                        borderWidth: 0,
                        offset: labels.map(l => winners.some(w => w[0] === l) ? 15 : 0)
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: { legend: { display: false } }
                }
            });
        });
    } catch (e) {
        document.getElementById("status").innerText = "❌ Error: Could not sync data.";
    }
}

function toggleAccordion(header) {
    const content = header.nextElementSibling;
    const isVisible = content.style.display === "block";
    content.style.display = isVisible ? "none" : "block";
    header.querySelector('span:last-child').innerText = isVisible ? "+" : "-";
}

loadResults();
</script>
</body>
</html>
