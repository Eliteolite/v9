<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-grid { display: grid; gap: 20px; text-align: left; }
        .accordion-item { background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .accordion-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { display: none; padding: 25px; background: rgba(0,0,0,0.3); }
        
        .result-container { display: flex; flex-wrap: wrap; gap: 30px; align-items: center; }
        .chart-wrapper { flex: 1; min-width: 250px; max-width: 300px; position: relative; }
        .stats-wrapper { flex: 1.5; min-width: 300px; }

        .winner-badge { font-size: 0.7rem; background: #facc15; color: #000; padding: 4px 10px; border-radius: 20px; font-weight: 800; margin-left: 10px; }
        
        /* Button Styles */
        .csv-btn { background: rgba(255,255,255,0.1); color: var(--text-main); border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin-top: 15px; transition: 0.3s; }
        .csv-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }
        
        .full-report-btn { 
            width: 100%; padding: 18px; margin-top: 40px; background: #34d399; color: #064e3b; 
            font-weight: 800; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 14px rgba(52, 211, 153, 0.3);
        }
        .full-report-btn:hover { background: #6ee7b7; transform: translateY(-2px); }

        .legend-list { list-style: none; padding: 0; margin: 0; }
        .legend-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; display: inline-block; }
        .vote-pill { background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 12px; font-size: 0.85rem; font-family: monospace; }
        .is-winner { color: #facc15; font-weight: 700; }
    </style>
</head>
<body>
<div class="container" style="max-width: 950px;">
    <header>
        <h1>Election Control Center</h1>
        <p id="status">Syncing with Google Sheets...</p>
    </header>
    
    <div class="admin-grid" id="mainDashboard"></div>

    <button id="downloadAllBtn" class="full-report-btn" style="display:none;" onclick="downloadFullReport()">
        📥 Download Full Election Report (All Positions)
    </button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";
const LOSER_COLORS = ['#38bdf8', '#818cf8', '#fb7185', '#34d399', '#a78bfa', '#f472b6', '#fbbf24', '#2dd4bf'];
let cachedVotes = [];

async function loadResults() {
    const dashboard = document.getElementById("mainDashboard");
    try {
        const response = await fetch(`${SCRIPT_URL}?action=getResults`);
        const rows = await response.json();
        cachedVotes = rows.map(r => ({ voter: r[1], selections: JSON.parse(r[2]) }));
        
        document.getElementById("status").innerText = `Total Ballots Counted: ${cachedVotes.length}`;
        document.getElementById("downloadAllBtn").style.display = "block";
        dashboard.innerHTML = "";

        const positions = Object.keys(cachedVotes[0].selections);

        positions.forEach(pos => {
            const counts = {};
            cachedVotes.forEach(v => {
                const choice = v.selections[pos];
                counts[choice] = (counts[choice] || 0) + 1;
            });

            const sortedEntries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const maxVotes = sortedEntries[0][1];
            const winners = sortedEntries.filter(e => e[1] === maxVotes);
            
            const chartData = sortedEntries.map((entry, index) => ({
                name: entry[0],
                count: entry[1],
                color: entry[1] === maxVotes ? '#facc15' : LOSER_COLORS[index % LOSER_COLORS.length]
            }));

            const id = pos.replace(/\s+/g, '');
            const item = document.createElement('div');
            item.className = 'accordion-item';
            item.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <div>
                        <strong>${pos}</strong>
                        <span class="winner-badge">${winners.length > 1 ? '👔 Tie' : '🏆 Winner'}: ${winners.map(w => w[0]).join(' & ')}</span>
                    </div>
                    <span>+</span>
                </div>
                <div class="accordion-content">
                    <div class="result-container">
                        <div class="chart-wrapper">
                            <canvas id="chart-${id}"></canvas>
                        </div>
                        <div class="stats-wrapper">
                            <ul class="legend-list">
                                ${chartData.map(d => `
                                    <li class="legend-item ${d.count === maxVotes ? 'is-winner' : ''}">
                                        <span><span class="color-dot" style="background:${d.color}"></span>${d.name}</span>
                                        <span class="vote-pill">${d.count} Votes</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <button class="csv-btn" onclick="downloadPositionCSV('${pos}')">
                                📥 Download ${pos} Results
                            </button>
                        </div>
                    </div>
                </div>
            `;
            dashboard.appendChild(item);

            new Chart(document.getElementById(`chart-${id}`), {
                type: 'doughnut',
                data: {
                    labels: chartData.map(d => d.name),
                    datasets: [{
                        data: chartData.map(d => d.count),
                        backgroundColor: chartData.map(d => d.color),
                        borderWidth: 0,
                        offset: chartData.map(d => d.count === maxVotes ? 15 : 0)
                    }]
                },
                options: { cutout: '65%', plugins: { legend: { display: false } } }
            });
        });
    } catch (e) {
        document.getElementById("status").innerText = "❌ Error fetching results.";
    }
}

// Download CSV for a specific category
function downloadPositionCSV(position) {
    let csv = "Voter ID,Selected Candidate\n";
    cachedVotes.forEach(v => {
        csv += `${v.voter},"${v.selections[position]}"\n`;
    });
    triggerDownload(csv, `${position}_Results.csv`);
}

// Download Full Election CSV (All positions in one sheet)
function downloadFullReport() {
    if (cachedVotes.length === 0) return;
    
    const positions = Object.keys(cachedVotes[0].selections);
    let csv = "Voter ID," + positions.map(p => `"${p}"`).join(",") + "\n";
    
    cachedVotes.forEach(v => {
        let row = `${v.voter}`;
        positions.forEach(p => {
            row += `,"${v.selections[p]}"`;
        });
        csv += row + "\n";
    });
    
    triggerDownload(csv, "Full_Election_Report_2026.csv");
}

function triggerDownload(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = window.URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function toggleAccordion(header) {
    const content = header.nextElementSibling;
    const isVisible = content.style.display === "block";
    content.style.display = isVisible ? "none" : "block";
    header.querySelector('span:last-child').innerText = isVisible ? "+" : "-";
}

loadResults();
</script>
</body>
</html>
