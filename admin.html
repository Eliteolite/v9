<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-grid { display: grid; gap: 20px; text-align: left; }
        .accordion-item { background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .accordion-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { display: none; padding: 20px; background: rgba(0,0,0,0.2); text-align: center; }
        .winner-tag { font-size: 0.75rem; background: rgba(56, 189, 248, 0.15); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
<div class="container" style="max-width: 800px;">
    <header>
        <h1>Election Control Center</h1>
        <p>Live Results from Google Sheets</p>
    </header>

    <div id="status" style="margin-bottom: 20px; color: var(--primary); font-weight: bold;">Fetching cloud data...</div>
    
    <div class="admin-grid" id="mainDashboard"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";

async function loadResults() {
    const dashboard = document.getElementById("mainDashboard");
    try {
        const response = await fetch(`${SCRIPT_URL}?action=getResults`);
        const rows = await response.json();
        const votes = rows.map(r => ({ selections: JSON.parse(r[2]) }));
        
        document.getElementById("status").innerText = `Total Ballots Cast: ${votes.length}`;
        dashboard.innerHTML = "";

        if (votes.length === 0) return;

        const positions = Object.keys(votes[0].selections);

        positions.forEach(pos => {
            const counts = {};
            votes.forEach(v => {
                const choice = v.selections[pos];
                counts[choice] = (counts[choice] || 0) + 1;
            });

            // Find Winner
            const entries = Object.entries(counts);
            const winner = entries.reduce((a, b) => (a[1] > b[1] ? a : b));

            const id = pos.replace(/\s+/g, '');
            const item = document.createElement('div');
            item.className = 'accordion-item';
            item.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <div>
                        <strong>${pos}</strong>
                        <span class="winner-tag">🏆 ${winner[0]}</span>
                    </div>
                    <span>+</span>
                </div>
                <div class="accordion-content">
                    <div style="max-width: 300px; margin: 0 auto;">
                        <canvas id="chart-${id}"></canvas>
                    </div>
                </div>
            `;
            dashboard.appendChild(item);

            const labels = Object.keys(counts);
            new Chart(document.getElementById(`chart-${id}`), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: Object.values(counts),
                        // Winner gets Primary Blue, others get muted grey
                        backgroundColor: labels.map(l => l === winner[0] ? '#38bdf8' : 'rgba(255,255,255,0.1)'),
                        borderWidth: 0,
                        // Winner slice pops out
                        offset: labels.map(l => l === winner[0] ? 20 : 0)
                    }]
                },
                options: {
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
                }
            });
        });
    } catch (e) {
        document.getElementById("status").innerText = "❌ Error: Could not connect to Google Sheets.";
    }
}

function toggleAccordion(header) {
    const content = header.nextElementSibling;
    const isVisible = content.style.display === "block";
    content.style.display = isVisible ? "none" : "block";
    header.querySelector('span:last-child').innerText = isVisible ? "+" : "-";
}

loadResults();
</script>
</body>
</html>
