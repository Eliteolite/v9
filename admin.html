<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-grid { display: grid; gap: 20px; text-align: left; }
        .accordion-item { background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .accordion-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { display: none; padding: 20px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="container" style="max-width: 800px;">
    <header>
        <h1>Election Control Center</h1>
        <p>Real-time results from Google Sheets</p>
    </header>

    <div id="status-box" style="margin-bottom: 20px; color: var(--primary);">Connecting to cloud...</div>
    
    <div class="admin-grid" id="mainDashboard"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";

async function loadResults() {
    const dashboard = document.getElementById("mainDashboard");
    const status = document.getElementById("status-box");

    try {
        const response = await fetch(`${SCRIPT_URL}?action=getResults`);
        const rows = await response.json();
        
        // Rows[x][2] contains the Selections JSON string from the sheet
        const votes = rows.map(r => ({ selections: JSON.parse(r[2]) }));
        
        status.innerText = `Total Ballots Cast: ${votes.length}`;
        dashboard.innerHTML = "";

        if (votes.length === 0) {
            dashboard.innerHTML = "<p>No votes found in the database.</p>";
            return;
        }

        const positions = Object.keys(votes[0].selections);

        positions.forEach(pos => {
            const counts = {};
            votes.forEach(v => {
                const choice = v.selections[pos];
                counts[choice] = (counts[choice] || 0) + 1;
            });

            const id = pos.replace(/\s+/g, '');
            const item = document.createElement('div');
            item.className = 'accordion-item';
            item.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <strong>${pos}</strong>
                    <span>+</span>
                </div>
                <div class="accordion-content">
                    <canvas id="chart-${id}"></canvas>
                </div>
            `;
            dashboard.appendChild(item);

            new Chart(document.getElementById(`chart-${id}`), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#38bdf8', '#818cf8', '#fb7185', '#34d399', '#facc15'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
                }
            });
        });
    } catch (e) {
        status.innerText = "❌ Error connecting to Google Sheets.";
    }
}

function toggleAccordion(header) {
    const content = header.nextElementSibling;
    const isVisible = content.style.display === "block";
    content.style.display = isVisible ? "none" : "block";
    header.querySelector('span').innerText = isVisible ? "+" : "-";
}

loadResults();
</script>
</body>
</html>
