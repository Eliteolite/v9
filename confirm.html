<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Your Ballot - NTIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Review Your Ballot</h1>
        <p>Ensure your selections are correct before submitting.</p>
    </header>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05);">
            <span>Ballot Token</span>
            <span style="font-family: monospace; color: var(--primary); font-weight: bold;" id="ballotToken"></span>
        </div>

        <div id="receiptList" style="background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; overflow: hidden; margin-bottom: 20px;">
            </div>

        <button id="submitBtn" onclick="submitVote()">Cast My Final Vote</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNxFMBm7hTPdO9BTmnx0QUB9BTneG9lnBcB6VundIrC0-zDINYnukwjw6XiV4eNmfT/exec";
const selections = JSON.parse(localStorage.getItem("selections") || "{}");

function renderReceipt() {
    let html = "";
    for (const pos in selections) {
        html += `
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
            <div style="text-align: left;">
                <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">${pos}</span>
                <div style="font-weight: 600; color: white; margin-top: 4px;">${selections[pos]}</div>
            </div>
            <button onclick="goToEdit('${pos}')" style="width: auto; padding: 8px 16px; font-size: 0.75rem; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Change
            </button>
        </div>`;
    }
    document.getElementById("receiptList").innerHTML = html;
}

function goToEdit(posName) {
    localStorage.setItem("jumpToPosition", posName);
    localStorage.setItem("singleEditMode", "true"); 
    window.location.href = "vote.html";
}

async function submitVote() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Encrypting & Submitting...";
    btn.disabled = true;

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                voter: localStorage.getItem("currentVoter") || "Anonymous",
                selections: selections
            })
        });

        localStorage.removeItem("selections");
        window.location.href = "thankyou.html";
    } catch (e) {
        alert("Submission failed. Check connection.");
        btn.disabled = false;
        btn.innerText = "Cast My Final Vote";
    }
}

document.getElementById("ballotToken").innerText = "TX-" + Math.random().toString(36).substr(2, 6).toUpperCase();
renderReceipt();
</script>
</body>
</html>
