<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Your Ballot - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ballot-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); padding: 12px 20px;
            border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ballot-id { font-family: monospace; color: var(--primary); font-weight: bold; }
        .receipt-area { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .pos-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        .candidate-val { font-weight: 600; color: white; margin-top: 4px; }
        .edit-btn { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Review Your Ballot</h1>
        <p>Ensure your selections are correct before submitting.</p>
    </header>

    <div class="card">
        <div class="ballot-header">
            <span>Ballot Token</span>
            <span class="ballot-id" id="ballotToken"></span>
        </div>

        <div class="receipt-area" id="receiptList"></div>

        <button id="submitBtn" onclick="submitVote()">Cast My Final Vote</button>
        <button class="edit-btn" style="width: 100%; margin-top: 10px;" onclick="window.location.href='vote.html'">Back to Ballot</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";
const selections = JSON.parse(localStorage.getItem("selections") || "{}");

function renderReceipt() {
    let html = "";
    for (const pos in selections) {
        html += `
        <div class="confirm-row">
            <div class="pos-info">
                <span class="pos-label">${pos}</span>
                <div class="candidate-val">${selections[pos]}</div>
            </div>
            <button class="edit-btn" onclick="goToEdit('${pos}')">Change</button>
        </div>`;
    }
    document.getElementById("receiptList").innerHTML = html;
}

function goToEdit(posName) {
    localStorage.setItem("jumpToPosition", posName);
    localStorage.setItem("singleEditMode", "true"); 
    window.location.href = "vote.html";
}

async function submitVote() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Syncing with Cloud Database...";
    btn.disabled = true;

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                voter: localStorage.getItem("currentVoter") || "Anonymous",
                selections: selections
            })
        });

        localStorage.removeItem("selections");
        window.location.href = "thankyou.html";
    } catch (e) {
        alert("Submission failed. Check your internet connection.");
        btn.disabled = false;
        btn.innerText = "Cast My Final Vote";
    }
}

document.getElementById("ballotToken").innerText = "TX-" + Math.random().toString(36).substr(2, 6).toUpperCase();
renderReceipt();
</script>
</body>
</html>
